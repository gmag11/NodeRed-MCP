services:
  nodered:
    image: nodered/node-red:latest-22
    ports:
      - "1880:1880"
    volumes:
      - ../nodered_data:/data
    restart: unless-stopped

  nodered-mcp:
    build: .
    env_file: .env
    ports:
      - "${MCP_HTTP_PORT:-3000}:${MCP_HTTP_PORT:-3000}"
    depends_on:
      - nodered
    restart: unless-stopped
